<div>
  <div class="d-flex justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-10">
      <h1 class="text-center">Sign in</h1>

      <div class="alert alert-danger" *ngIf="authenticationError">
        <strong>Failed to sign in!</strong> Please check your credentials and try again.
      </div>

      <form class="form" role="form" (ngSubmit)="login()" [formGroup]="loginForm">
        <div class="mb-3">
          <label class="username-label" for="username">Login</label>
          <input
            type="text"
            class="form-control"
            name="username"
            id="username"
            placeholder="Your username"
            formControlName="username"
            #username
          />
        </div>

        <div class="mb-3">
          <label for="password">Password</label>
          <input
            type="password"
            class="form-control"
            name="password"
            id="password"
            placeholder="Your password"
            formControlName="password"
          />
        </div>

        <div class="form-check">
          <label class="form-check-label" for="rememberMe">
            <input class="form-check-input" type="checkbox" name="rememberMe" id="rememberMe" formControlName="rememberMe" />
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">Sign in</button>
      </form>

      <div class="mt-3">
        <div class="d-flex justify-content-center">
          <span>Or sign in with:</span>
        </div>

        <div class="d-flex justify-content-center gap-2 mt-2">
          <button type="button" class="btn btn-danger" (click)="loginWithGoogle()"><i class="fab fa-google"></i> Google</button>
          <button type="button" class="btn btn-primary" (click)="loginWithFacebook()"><i class="fab fa-facebook"></i> Facebook</button>
        </div>
      </div>

      <div class="mt-3 alert alert-warning">
        <span>You don't have an account yet?</span>
        <a class="alert-link" routerLink="/account/register">Register a new account</a>
      </div>
    </div>
  </div>
</div>
